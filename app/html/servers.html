<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="/css/polaris.css" type="text/css" rel="stylesheet">
    <link rel="icon" href="/assets/polaris.svg">
    <title>Polaris</title>
    <meta property="og:title" content="Polaris">
    <meta property="og:description" content="An open-source XP bot">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#00ff80">
    <meta name="twitter:card" content="summary">
</head>
<body>
    <h2 class="middleflex" id="loading">Loading...</h2>

    <div id="everything" style="display: none">
        <div class="centerflex" style="flex-direction: column">
            <h2 style="font-size: 30px">Welcome back, <span id="username"></span></h2>
            <p style="font-size: 20px; margin-top: 4px; margin-bottom: 25px">Select a server to manage</p>
        </div>

        <div id="serverList" style="padding-bottom: 20px"></div>

        <div class="middleflex" style="padding-bottom: 30px">
            <a tabindex="-1" href="./logout"><button class="boringbutton" style="font-size: 22px; text-align: center; text-decoration: underline;">Log out</button></a>
        </div>

        <!-- server option template -->
        <div class="serverOption canfocus" tabindex="0">
            <div class="middleflex" style="width: 10px; justify-content: flex-start">
                <img sv="icon">
                <div>
                    <p style="font-size: 22px"><b sv="name"></b></p>
                    <p sv="status"></p>
                </div>
            </div>
            <div class="serverIcons" style="display: flex; align-items: center;">
                <a class="canfocus" sv="leaderboard" title="Leaderboard"><img src="./assets/icons/podium.svg"></a>
                <a class="canfocus" sv="settings" title="Settings"><img src="./assets/icons/cog.svg"></a>
                <a class="canfocus" sv="downloaddata" title="Download data"><img src="./assets/icons/download.svg"></a>
                <a class="canfocus" sv="invite" title="Invite to server!"><img src="./assets/icons/plus.svg"></a>
            </div>
        </div>
    </div>
</body>

<script type="text/javascript" src="./polaris.js"></script>
<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-135255146-1"></script>
<script type="text/javascript" src="/js/servers.js"></script>

</html>
